<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAS Grafika Komputer - Media Pembelajaran TK/PAUD</title>
    <style>
        :root {
            --bg-play: #e0f2fe;
            --pink-kid: #f472b6;
            --yellow-kid: #fbbf24;
            --blue-kid: #38bdf8;
            --green-kid: #4ade80;
            --text-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #fef08a;
            color: var(--text-color);
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 24px;
            border: 5px solid var(--pink-kid);
            box-shadow: 0 10px 0px #db2777;
        }

        .header-panel {
            background: linear-gradient(135deg, var(--blue-kid), var(--pink-kid));
            color: white;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .menu-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-menu {
            background-color: var(--yellow-kid);
            border: 3px solid #d97706;
            color: #7c2d12;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0px #b45309;
            transition: all 0.1s ease;
        }

        .btn-menu:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-menu.active {
            background-color: var(--green-kid);
            border-color: #15803d;
            color: #14532d;
            box-shadow: 0 4px 0px #166534;
        }

        .canvas-area {
            position: relative;
            background-color: var(--bg-play);
            border: 4px solid var(--blue-kid);
            border-radius: 16px;
            overflow: hidden;
            display: inline-block;
        }

        canvas {
            display: block;
            background-color: transparent;
        }

        .story-box {
            margin-top: 15px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 12px;
            border: 2px dashed var(--green-kid);
            font-size: 1.2rem;
            font-weight: bold;
            color: #166534;
        }

        .btn-suara {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-suara:hover { background-color: #9333ea; }

        .identity {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-panel">
            <h1>🌈 PETUALANGAN ANAK PINTAR ALOR 🌟</h1>
            <p>Media Pembelajaran Edukasi Anak TK / PAUD - Berbasis Grafika Komputer 2D</p>
        </div>

        <!-- Menu Tab Pilihan Pembelajaran Anak-anak -->
        <div class="menu-tabs">
            <button class="btn-menu active" onclick="gantiMenu(1, this)">🚢 1. Sejarah Alor</button>
            <button class="btn-menu" onclick="gantiMenu(2, this)">⛺ 2. Rumah Adat</button>
            <button class="btn-menu" onclick="gantiMenu(3, this)">🐬 3. Teman Dugong</button>
        </div>

        <!-- Area Grafika Komputer (Canvas) -->
        <div class="canvas-area">
            <canvas id="canvasAnak" width="750" height="400"></canvas>
        </div>

        <!-- Kotak Cerita Keterangan Sejarah / Budaya -->
        <div class="story-box" id="kotakTeks">
            Loading cerita indah...
        </div>
        <button class="btn-suara" onclick="bacakanCerita()">🔊 Dengarkan Suara</button>

        <!-- Identitas Kelompok / Mahasiswa -->
        <div class="identity">
            <p><strong>Tugas UAS Grafika Komputer - Prodi Informatika UNTRIB</strong></p>
            <p><strong>Viodolorosario Beda (24155201075)</strong></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvasAnak');
        const ctx = canvas.getContext('2d');
        const kotakTeks = document.getElementById('kotakTeks');

        let menuAktif = 1;
        let animasiID;

        // Variabel Objek Grafika Bergerak
        let kapalX = 50;
        let dugongX = 100;
        let dugongY = 250;
        let dugongArah = 1;
        let ombakOffset = 0;

        // Database Konten Cerita Anak TK
        const ceritaAnak = {
            1: "Halo anak pintar! Tahukah kamu? Nama 'Alor' itu dahulu kala ceritanya berasal dari kata 'Aliran' karena arus laut di sekitar pulau kita sangat kuat dan indah sekali! Dahulu, nenek moyang kita berlayar menggunakan kapal besar yang keren lho!",
            2: "Wah, lihat! Ini namanya Rumah Adat Fala Foka milik Suku Abui di Kampung Takpala. Rumahnya unik berbentuk kerucut tinggi dan terbuat dari anyaman bambu serta rumput kelapa. Di dalamnya hangat dan penuh kerukunan!",
            3: "Berenang seru yuk bersama Mawar si Dugong! Dugong adalah mamalia laut baik hati yang tinggal di Pantai Mali Alor. Mereka sangat suka memakan rumput laut segar dan berteman ramah dengan kita!"
        };

        // Fungsi Menggambar Menu 1: Sejarah & Kapal Berlayar
        function gambarSejarah() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Langit Cerah
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Matahari Ceria (Grafika Lingkaran)
            ctx.fillStyle = "#fbbf24";
            ctx.beginPath();
            ctx.arc(680, 70, 40, 0, Math.PI * 2);
            ctx.fill();

            // Pulau Alor di Kejauhan (Grafika Lengkung Busur)
            ctx.fillStyle = "#22c55e";
            ctx.beginPath();
            ctx.moveTo(350, 300);
            ctx.quadraticCurveTo(500, 100, 650, 300);
            ctx.fill();
            
            ctx.fillStyle = "#16a34a";
            ctx.beginPath();
            ctx.moveTo(100, 300);
            ctx.quadraticCurveTo(250, 150, 400, 300);
            ctx.fill();

            // Menggambar Kapal Tradisional Nenek Moyang (Grafika Primitif)
            ctx.save();
            ctx.translate(kapalX, 220);

            // Lambung Kapal
            ctx.fillStyle = "#b45309";
            ctx.beginPath();
            ctx.moveTo(0, 40);
            ctx.lineTo(120, 40);
            ctx.lineTo(100, 70);
            ctx.lineTo(20, 70);
            ctx.closePath();
            ctx.fill();

            // Tiang Layar (Garis Tekstur)
            ctx.strokeStyle = "#451a03";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(60, 40);
            ctx.lineTo(60, -20);
            ctx.stroke();

            // Layar Segitiga (Primitif Poligon)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(60, -15);
            ctx.lineTo(100, 25);
            ctx.lineTo(60, 25);
            ctx.closePath();
            ctx.fill();

            ctx.restore();

            // Air Laut Animasi Bergerak (Sinusoidal Wave)
            ctx.fillStyle = "#1d4ed8";
            ctx.beginPath();
            ctx.moveTo(0, 280);
            for (let x = 0; x <= canvas.width; x++) {
                let y = 280 + Math.sin((x + ombakOffset) * 0.03) * 8;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            ctx.fill();

            // Update Gerakan Nilai Animasi
            kapalX += 1;
            if (kapalX > canvas.width) kapalX = -120;
            ombakOffset += 2;

            animasiID = requestAnimationFrame(gambarSejarah);
        }

        // Fungsi Menggambar Menu 2: Rumah Adat Fala Foka (Transformasi Objek)
        function gambarRumahAdat() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Latar Pemandangan Hijau Pegunungan
            ctx.fillStyle = "#bbf7d0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Awan Primitif Campuran Lingkaran
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(150, 80, 30, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(180, 70, 40, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(210, 80, 30, 0, Math.PI*2); ctx.fill();

            // TITIK KOORDINAT UTAMA RUMAH ADAT ALOR (Fala Foka)
            let rx = canvas.width / 2;
            let ry = 280;

            // 1. Fondasi Kayu (Bawah)
            ctx.fillStyle = "#78350f";
            ctx.fillRect(rx - 70, ry, 140, 15);

            // 2. Tiang-tiang Penyangga Kecil
            ctx.strokeStyle = "#451a03";
            ctx.lineWidth = 5;
            for(let i = -50; i <= 50; i += 25) {
                ctx.beginPath();
                ctx.moveTo(rx + i, ry);
                ctx.lineTo(rx + i, ry - 40);
                ctx.stroke();
            }

            // 3. Badan Rumah (Tengah)
            ctx.fillStyle = "#d97706";
            ctx.fillRect(rx - 60, ry - 80, 120, 40);

            // 4. Pintu Masuk Kecil
            ctx.fillStyle = "#451a03";
            ctx.fillRect(rx - 15, ry - 65, 30, 25);

            // 5. Atap Menara Tinggi Kerucut Alor (Bentuk Segitiga Grafika Tinggi)
            ctx.fillStyle = "#a16207";
            ctx.beginPath();
            ctx.moveTo(rx, ry - 230); // Puncak
            ctx.lineTo(rx - 90, ry - 75); // Sudut Kiri
            ctx.lineTo(rx + 90, ry - 75); // Sudut Kanan
            ctx.closePath();
            ctx.fill();
            
            // Tekstur Garis Anyaman Jerami Atap
            ctx.strokeStyle = "#854d0e";
            ctx.lineWidth = 2;
            for(let h = ry - 75; h > ry - 220; h -= 25) {
                ctx.beginPath();
                ctx.moveTo(rx - (ry - 230 - h)*0.4, h);
                ctx.lineTo(rx + (ry - 230 - h)*0.4, h);
                ctx.stroke();
            }

            // Papan Nama Edukasi
            ctx.fillStyle = "#1e293b";
            ctx.font = "bold 16px 'Comic Sans MS'";
            ctx.fillText("Rumah Adat Fala Foka", rx - 80, ry + 40);
        }

        // Fungsi Menggambar Menu 3: Dugong Berenang Ceria
        function gambarDugong() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Latar Biru Dalam Laut
            ctx.fillStyle = "#0c4a6e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Efek Gelembung Air Random
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            for(let b = 0; b < 5; b++) {
                ctx.beginPath();
                ctx.arc((100 * b + ombakOffset) % canvas.width, 80 + (b * 40), 10 + b, 0, Math.PI*2);
                ctx.fill();
            }

            // Rumput Laut Rumput Primitif Kurva
            ctx.strokeStyle = "#15803d";
            ctx.lineWidth = 12;
            for(let rx = 30; rx < canvas.width; rx += 90) {
                ctx.beginPath();
                ctx.moveTo(rx, canvas.height);
                ctx.quadraticCurveTo(rx + Math.sin(ombakOffset*0.05)*15, 300, rx, 250);
                ctx.stroke();
            }

            // MENGGAMBAR MUKALAN OBJEK DUGONG/LUMBA-LUMBA
            ctx.save();
            ctx.translate(dugongX, dugongY);
            // Balik arah menghadap jika berenang mundur
            if(dugongArah === -1) {
                ctx.scale(-1, 1);
            }

            // Badan Bulat Oval Dugong
            ctx.fillStyle = "#94a3b8";
            ctx.beginPath();
            ctx.ellipse(0, 0, 70, 35, 0, 0, Math.PI * 2);
            ctx.fill();

            // Ekor Belakang
            ctx.fillStyle = "#64748b";
            ctx.beginPath();
            ctx.moveTo(-60, 0);
            ctx.lineTo(-90, -25);
            ctx.lineTo(-80, 0);
            ctx.lineTo(-90, 25);
            ctx.closePath();
            ctx.fill();

            // Sirip Tangan Perenang
            ctx.fillStyle = "#64748b";
            ctx.beginPath();
            ctx.ellipse(10, 20, 15, 25, Math.PI/4, 0, Math.PI*2);
            ctx.fill();

            // Mata Hitam Imut
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(45, -10, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Logika Gerak Bolak-balik Dugong
            dugongX += 2 * dugongArah;
            if(dugongX > canvas.width - 80) dugongArah = -1;
            if(dugongX < 80) dugongArah = 1;

            ombakOffset += 1;
            animasiID = requestAnimationFrame(gambarDugong);
        }

        // Fungsi Pengendali Navigasi Menu Pembelajaran
        function gantiMenu(nomorMenu, elemenTombol) {
            cancelAnimationFrame(animasiID);
            menuAktif = nomorMenu;

            // Perbarui Efek Aktif Tombol Menu
            document.querySelectorAll('.btn-menu').forEach(btn => btn.classList.remove('active'));
            elemenTombol.classList.add('active');

            // Ganti Teks Deskripsi Cerita
            kotakTeks.innerText = ceritaAnak[nomorMenu];

            // Render Grafika Sesuai Pilihan
            if (nomorMenu === 1) {
                gambarSejarah();
            } else if (nomorMenu === 2) {
                gambarRumahAdat();
            } else if (nomorMenu === 3) {
                gambarDugong();
            }
        }

        // Fitur Suara Text-to-Speech Otomatis Supaya Membantu Anak TK Belajar Mendengar
        function bacakanCerita() {
            let teks = ceritaAnak[menuAktif];
            let suara = new SpeechSynthesisUtterance(teks);
            suara.lang = "id-ID"; // Format Bahasa Indonesia Resmi
            suara.rate = 0.9; // Kecepatan suara agak lambat agar anak TK paham
            window.speechSynthesis.speak(suara);
        }

        // Jalankan Halaman Utama Pertama Kali
        gantiMenu(1, document.querySelector('.btn-menu'));
    </script>
</body>
</html>
